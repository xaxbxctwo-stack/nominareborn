<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nómina de Trabajadores Reborn</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- CONFIGURACIÓN DE FIREBASE ---
        let config = {};
        
        // REEMPLAZA LAS LÍNEAS DE ABAJO CON TU CONFIGURACIÓN DE FIREBASE CONSOLE:
        config = {
            {

  apiKey: "AIzaSyANC4iGNEA435_WzIhZ_rDKXFxDAJKOlQk",

  authDomain: "nominareborn-7b44d.firebaseapp.com",

  projectId: "nominareborn-7b44d",

  storageBucket: "nominareborn-7b44d.firebasestorage.app",

  messagingSenderId: "1090828334810",

  appId: "1:1090828334810:web:5d853ea76a23894e4517e3"

};

        };

        // Lógica de respaldo por si olvidas pegar la config arriba
        try {
            if (config.apiKey.includes("PEGA_AQUÍ")) {
                config = JSON.parse(__firebase_config);
            }
        } catch (e) {}

        const app = initializeApp(config);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        let currentAppId = 'nomina-reborn-v3';
        try { if (typeof __app_id !== 'undefined') currentAppId = __app_id; } catch(e) {}

        let appData = { empleados: [], trabajos: [], misTareas: [] };
        let user = null;
        let mainChart = null;
        let monthlyChart = null;

        async function initAuth() {
            try {
                let token = null;
                try { if (typeof __initial_auth_token !== 'undefined') token = __initial_auth_token; } catch(e) {}
                if (token && !config.apiKey.includes("TU_PROYECTO")) {
                    await signInWithCustomToken(auth, token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (e) { 
                console.error("Error Auth:", e);
                showToast("Error de conexión a la nube");
            }
        }

        onAuthStateChanged(auth, (u) => {
            user = u;
            if (user) setupDataSync();
        });

        function setupDataSync() {
            const dataDocRef = doc(db, 'artifacts', currentAppId, 'public', 'data', 'nomina_v3', 'global_state');
            onSnapshot(dataDocRef, (docSnap) => {
                if (docSnap.exists()) {
                    appData = docSnap.data();
                } else {
                    appData = { empleados: [{id: 1, nombre: "Jose"}, {id: 2, nombre: "Monky"}, {id: 3, nombre: "Polar"}], trabajos: [], misTareas: [] };
                    saveToCloud();
                }
                actualizarUI();
                if (!document.getElementById('tab-resumen').classList.contains('hidden')) renderCharts();
            }, (err) => {
                console.error("Error Sincronización:", err);
                showToast("Error: Verifica las reglas de Firestore");
            });
        }

        async function saveToCloud() {
            if (!user) return;
            const dataDocRef = doc(db, 'artifacts', currentAppId, 'public', 'data', 'nomina_v3', 'global_state');
            try { await setDoc(dataDocRef, appData); } catch (error) { showToast("Error al sincronizar"); }
        }

        window.intentarLogin = () => {
            if (document.getElementById('login-pass').value === "1234") {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                setTimeout(() => { actualizarUI(); renderCharts(); }, 100);
            } else { showToast("PIN incorrecto"); }
        };

        window.registrarMiTarea = async (e) => {
            e.preventDefault();
            const valor = parseFloat(document.getElementById('mi-valor-tarea').value);
            const desc = document.getElementById('mi-desc-tarea').value;
            if (isNaN(valor) || !desc) return;
            appData.misTareas.push({ id: Date.now(), descripcion: desc, monto: valor, fecha: new Date().toISOString() });
            e.target.reset();
            await saveToCloud();
            showToast("Guardado");
        };

        window.agregarEmpleado = async () => {
            const n = document.getElementById('nombre-empleado').value.trim();
            if(!n) return;
            appData.empleados.push({id: Date.now(), nombre: n});
            document.getElementById('nombre-empleado').value = '';
            await saveToCloud();
            showToast("Añadido");
        };

        window.registrarTareaTrabajador = async (e) => {
            e.preventDefault();
            const empId = parseInt(document.getElementById('sel-empleado-trabajo').value);
            const valor = parseFloat(document.getElementById('valor-trabajo').value);
            const desc = document.getElementById('desc-trabajo').value;
            if (!empId || isNaN(valor) || !desc) return;
            appData.trabajos.push({ id: Date.now(), empId, descripcion: desc, valor, fecha: new Date().toISOString(), pagado: false });
            e.target.reset();
            await saveToCloud();
            showToast("Tarea asignada");
        };

        window.marcarPagado = async (id) => {
            appData.trabajos = appData.trabajos.map(t => t.empId === id ? {...t, pagado: true} : t);
            await saveToCloud();
            showToast("Pagado");
        };

        window.eliminarEmpleado = async (id) => {
            if(confirm("¿Eliminar?")) {
                appData.empleados = appData.empleados.filter(e => e.id !== id);
                appData.trabajos = appData.trabajos.filter(t => t.empId !== id);
                await saveToCloud();
                showToast("Eliminado");
            }
        };

        window.switchTab = (id) => {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.getElementById('tab-'+id).classList.remove('hidden');
            document.querySelectorAll('button[id^="btn-"]').forEach(b => b.classList.remove('tab-active'));
            document.getElementById('btn-'+id).classList.add('tab-active');
            if (id === 'resumen') renderCharts();
        };

        function actualizarUI() {
            const sel = document.getElementById('sel-empleado-trabajo');
            if(sel) {
                const cur = sel.value;
                sel.innerHTML = '<option value="" disabled selected>Seleccionar Trabajador</option>' + 
                    appData.empleados.map(e => `<option value="${e.id}">${e.nombre}</option>`).join('');
                if(cur) sel.value = cur;
            }
            const tInv = appData.trabajos.reduce((acc, t) => acc + t.valor, 0);
            const tCob = appData.misTareas.reduce((acc, t) => acc + t.monto, 0);
            const neta = tCob - tInv;
            document.getElementById('stat-inversion-total').innerText = `$${tInv.toFixed(2)}`;
            document.getElementById('stat-ganancia-bruta').innerText = `$${tCob.toFixed(2)}`;
            document.getElementById('stat-ganancia-neta').innerText = `$${neta.toFixed(2)}`;
            document.getElementById('stat-ganancia-neta').className = `text-3xl font-bold ${neta >= 0 ? 'text-green-500' : 'text-red-500'}`;
            const listaYo = document.getElementById('lista-mis-tareas');
            if(listaYo) listaYo.innerHTML = [...appData.misTareas].reverse().slice(0, 5).map(t => `<div class="osrs-card p-3 flex justify-between items-center bg-black/10"><div><p class="text-white text-sm font-bold">${t.descripcion}</p><p class="text-[10px] text-gray-500">${new Date(t.fecha).toLocaleDateString()}</p></div><p class="text-green-500 font-bold">$${t.monto.toFixed(2)}</p></div>`).join('');
            const grid = document.getElementById('grid-empleados');
            if(grid) grid.innerHTML = appData.empleados.map(e => `<div class="osrs-card p-4 flex justify-between items-center"><span class="font-bold text-white">${e.nombre}</span><button onclick="eliminarEmpleado(${e.id})" class="text-red-900 hover:text-red-500"><svg class="h-5 w-5" fill="currentColor" viewBox="0 0 20 20"><path d="M4 6h12M10 11v6M14 11v6M6 11v6M5 6l1-1h8l1 1M19 6h-1v12a2 2 0 01-2 2H4a2 2 0 01-2-2V6H1" /></svg></button></div>`).join('');
            const cuerpo = document.getElementById('tabla-nomina-cuerpo');
            if(cuerpo) {
                cuerpo.innerHTML = '';
                appData.empleados.forEach(e => {
                    const monto = appData.trabajos.filter(t => t.empId === e.id && !t.pagado).reduce((acc, t) => acc + t.valor, 0);
                    if(monto > 0) cuerpo.innerHTML += `<tr class="hover:bg-black/20"><td class="p-4 font-bold text-white">${e.nombre}</td><td class="p-4 text-yellow-500 font-bold">$${monto.toFixed(2)}</td><td class="p-4 text-right"><button onclick="marcarPagado(${e.id})" class="btn-osrs text-[10px] px-3 py-1 rounded">PAGAR</button></td></tr>`;
                });
            }
        }

        window.renderCharts = () => {
            const ctx1 = document.getElementById('yieldChart');
            if(ctx1) {
                if(mainChart) mainChart.destroy();
                mainChart = new Chart(ctx1, { type: 'bar', data: { labels: appData.empleados.map(e => e.nombre), datasets: [{ data: appData.empleados.map(e => appData.trabajos.filter(t => t.empId === e.id).length), backgroundColor: '#c2a352' }] }, options: { maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, ticks: { color: '#888' } }, x: { ticks: { color: '#888' } } } } });
            }
            const ctx2 = document.getElementById('monthlyChart');
            if(ctx2) {
                const invMes = new Array(12).fill(0);
                appData.trabajos.forEach(t => { invMes[new Date(t.fecha).getMonth()] += t.valor; });
                if(monthlyChart) monthlyChart.destroy();
                monthlyChart = new Chart(ctx2, { type: 'line', data: { labels: ["Ene", "Feb", "Mar", "Abr", "May", "Jun", "Jul", "Ago", "Sep", "Oct", "Nov", "Dic"], datasets: [{ label: 'Inversión', data: invMes, borderColor: '#c2a352', backgroundColor: 'rgba(194,163,82,0.1)', fill: true }] }, options: { maintainAspectRatio: false, scales: { y: { beginAtZero: true, ticks: { color: '#888' } }, x: { ticks: { color: '#888' } } } } });
            }
        };

        window.showToast = (m) => {
            const t = document.getElementById('toast');
            if (!t) return;
            t.innerText = m; t.classList.remove('opacity-0');
            setTimeout(() => t.classList.add('opacity-0'), 2500);
        };

        initAuth();
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;600;700&display=swap');
        :root { --osrs-panel: #3d352b; --osrs-gold: #c2a352; --osrs-border: #5d5447; }
        body { font-family: 'Inter', sans-serif; background: #1a1714; color: #e1d1bc; overflow-x: hidden; }
        h1, h2, h3 { font-family: 'Cinzel', serif; }
        .osrs-card { background: var(--osrs-panel); border: 2px solid #2a241e; position: relative; box-shadow: inset 0 0 10px rgba(0,0,0,0.5); }
        .osrs-card::after { content: ""; position: absolute; inset: 1px; border: 1px solid var(--osrs-border); pointer-events: none; }
        .btn-osrs { background: linear-gradient(to bottom, #4a4235, #2a241e); border: 1px solid var(--osrs-gold); color: var(--osrs-gold); cursor: pointer; transition: all 0.2s; }
        .tab-active { background: var(--osrs-gold) !important; color: #1a1714 !important; }
        input, select { background: #2a241e !important; border: 1px solid var(--osrs-border) !important; color: white !important; }
        .text-detail { font-size: 0.7rem; letter-spacing: 0.1em; }
    </style>
</head>
<body class="pb-20">
    <div id="login-screen" class="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/95">
        <div class="osrs-card w-full max-w-md p-8 text-center">
            <h2 class="text-2xl font-bold text-[#c2a352] mb-8 uppercase tracking-widest">Nómina Reborn</h2>
            <input type="password" id="login-pass" placeholder="PIN DE ACCESO" class="w-full p-4 rounded text-center mb-4 tracking-widest text-2xl font-bold">
            <button onclick="intentarLogin()" class="w-full btn-osrs py-4 uppercase font-bold tracking-widest">Verificar</button>
        </div>
    </div>
    <div id="main-app" class="hidden">
        <nav class="bg-[#3d352b] border-b-2 border-[#c2a352] p-4 sticky top-0 z-50">
            <div class="max-w-6xl mx-auto flex justify-between items-center">
                <h1 class="font-bold uppercase text-sm md:text-lg text-yellow-500">Nómina de Trabajadores <span class="text-white">Reborn</span></h1>
                <div class="hidden md:block text-[9px] text-gray-400 uppercase tracking-[0.2em]">Servidor en Línea</div>
            </div>
        </nav>
        <main class="max-w-6xl mx-auto p-4 space-y-6">
            <div class="flex bg-[#2a241e] border border-[#5d5447] p-1 rounded gap-1 overflow-x-auto no-scrollbar">
                <button onclick="switchTab('resumen')" id="btn-resumen" class="flex-1 min-w-[100px] py-3 text-detail uppercase btn-osrs tab-active">Balances</button>
                <button onclick="switchTab('mianalisis')" id="btn-mianalisis" class="flex-1 min-w-[100px] py-3 text-detail uppercase btn-osrs">Mis Ganancias</button>
                <button onclick="switchTab('trabajos')" id="btn-trabajos" class="flex-1 min-w-[100px] py-3 text-detail uppercase btn-osrs">Asignar</button>
                <button onclick="switchTab('empleados')" id="btn-empleados" class="flex-1 min-w-[100px] py-3 text-detail uppercase btn-osrs">Equipo</button>
                <button onclick="switchTab('nomina')" id="btn-nomina" class="flex-1 min-w-[100px] py-3 text-detail uppercase btn-osrs">Nómina</button>
            </div>
            <section id="tab-resumen" class="space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div class="osrs-card p-6 text-center"><p class="text-gray-400 text-detail uppercase mb-1">Inversión Equipo</p><p id="stat-inversion-total" class="text-3xl font-bold text-yellow-500">$0.00</p></div>
                    <div class="osrs-card p-6 text-center"><p class="text-gray-400 text-detail uppercase mb-1">Mis Ingresos Brutos</p><p id="stat-ganancia-bruta" class="text-3xl font-bold text-white">$0.00</p></div>
                    <div class="osrs-card p-6 text-center"><p class="text-gray-400 text-detail uppercase mb-1">Resultado Final</p><p id="stat-ganancia-neta" class="text-3xl font-bold">$0.00</p></div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="osrs-card p-6 min-h-[300px]"><h3 class="text-xs uppercase text-yellow-600 mb-4 font-bold tracking-widest">Tareas por Miembro</h3><div class="h-64"><canvas id="yieldChart"></canvas></div></div>
                    <div class="osrs-card p-6 min-h-[300px]"><h3 class="text-xs uppercase text-yellow-600 mb-4 font-bold tracking-widest">Flujo Mensual</h3><div class="h-64"><canvas id="monthlyChart"></canvas></div></div>
                </div>
            </section>
            <section id="tab-mianalisis" class="hidden space-y-4"><div class="osrs-card p-6"><h3 class="text-yellow-500 uppercase text-xs mb-4 font-bold">Registrar Cobro Realizado</h3><form onsubmit="registrarMiTarea(event)" class="space-y-4"><input type="text" id="mi-desc-tarea" placeholder="Ej: Pago de cliente X" class="w-full p-4 rounded" required><input type="number" id="mi-valor-tarea" step="0.01" placeholder="Monto $" class="w-full p-4 rounded" required><button type="submit" class="w-full btn-osrs py-4 font-bold uppercase">Guardar en mi Historial</button></form></div><div id="lista-mis-tareas" class="space-y-2"></div></section>
            <section id="tab-trabajos" class="hidden space-y-4"><div class="osrs-card p-6"><h3 class="text-yellow-500 uppercase text-xs mb-4 font-bold">Nueva Tarea para el Equipo</h3><form onsubmit="registrarTareaTrabajador(event)" class="space-y-4"><select id="sel-empleado-trabajo" class="w-full p-4 rounded" required></select><input type="text" id="desc-trabajo" placeholder="¿Qué hizo el trabajador?" class="w-full p-4 rounded" required><input type="number" id="valor-trabajo" step="0.01" placeholder="Pago acordado $" class="w-full p-4 rounded" required><button type="submit" class="w-full btn-osrs py-4 font-bold uppercase">Registrar Tarea</button></form></div></section>
            <section id="tab-empleados" class="hidden space-y-4"><div class="osrs-card p-6 flex gap-2"><input type="text" id="nombre-empleado" placeholder="Nuevo trabajador..." class="flex-1 p-4 rounded"><button onclick="agregarEmpleado()" class="btn-osrs px-6 font-bold uppercase text-xs">Añadir</button></div><div id="grid-empleados" class="grid grid-cols-1 sm:grid-cols-2 gap-3"></div></section>
            <section id="tab-nomina" class="hidden"><div class="osrs-card overflow-x-auto"><table class="w-full text-left min-w-[400px]"><thead class="bg-black/40 text-[10px] uppercase text-yellow-600"><tr><th class="p-5">Nombre</th><th class="p-5">Pendiente de Pago</th><th class="p-5 text-right">Acción</th></tr></thead><tbody id="tabla-nomina-cuerpo" class="divide-y divide-[#5d5447]"></tbody></table></div></section>
        </main>
    </div>
    <div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-[#2a241e] border border-[#c2a352] text-white px-8 py-3 rounded-full opacity-0 transition-all z-[200] text-[10px] uppercase tracking-widest shadow-2xl pointer-events-none"></div>
</body>
</html>
