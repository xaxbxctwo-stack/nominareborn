<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nómina Pro - Cloud</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- TU CONFIGURACIÓN DE FIREBASE ---
        // Asegúrate de rellenar esto con los datos de tu consola de Firebase
        const firebaseConfig = {
            apiKey:  "AIzaSyANC4iGNEA435_WzIhZ_rDKXFxDAJKOlQk",
            authDomain: "nominareborn-7b44d.firebaseapp.com",
            projectId: "nominareborn-7b44d",
            storageBucket:"nominareborn-7b44d.firebasestorage.app",
            messagingSenderId: "1090828334810",
            appId: "1:1090828334810:web:5d853ea76a23894e4517e3"
        };

        // Estado inicial
        let db, auth;
        let appData = { empleados: [], trabajos: [], misTareas: [] };
        let user = null;

        // Inicialización segura
        try {
            const app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);
            console.log("Firebase inicializado correctamente");
        } catch (error) {
            console.error("Error inicializando Firebase:", error);
            alert("Error crítico: La configuración de Firebase es incorrecta. Revisa las líneas 22-29.");
        }

        // Autenticación
        signInAnonymously(auth).catch(err => {
            console.error("Error Auth:", err);
            document.getElementById('debug-msg').innerText = "Error: Activa 'Anonymous Auth' en Firebase";
        });

        onAuthStateChanged(auth, (u) => {
            if (u) {
                user = u;
                setupDataSync();
            }
        });

        function setupDataSync() {
            // Ruta fija para evitar errores de segmentos
            const dataDocRef = doc(db, 'nomina_data', 'global_state');
            
            onSnapshot(dataDocRef, (docSnap) => {
                if (docSnap.exists()) {
                    appData = docSnap.data();
                } else {
                    // Datos iniciales si la base está vacía
                    appData = { 
                        empleados: [{id: 1, nombre: "Trabajador 1"}], 
                        trabajos: [], 
                        misTareas: [] 
                    };
                    saveToCloud();
                }
                actualizarUI();
            }, (err) => {
                console.error("Error Firestore:", err);
                document.getElementById('debug-msg').innerText = "Error de Permisos: Pon Firestore en 'Modo Prueba'";
            });
        }

        async function saveToCloud() {
            if (!user) return;
            const dataDocRef = doc(db, 'nomina_data', 'global_state');
            try {
                await setDoc(dataDocRef, appData);
            } catch (e) {
                console.error("Error al guardar:", e);
            }
        }

        // --- FUNCIONES GLOBALES ---
        window.intentarLogin = () => {
            const pin = document.getElementById('login-pass').value;
            if (pin === "1234") {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                actualizarUI();
            } else {
                alert("PIN incorrecto");
            }
        };

        window.agregarEmpleado = async () => {
            const n = document.getElementById('nombre-empleado').value.trim();
            if(!n) return;
            appData.empleados.push({id: Date.now(), nombre: n});
            document.getElementById('nombre-empleado').value = '';
            await saveToCloud();
        };

        window.registrarTrabajo = async (e) => {
            e.preventDefault();
            const empId = parseInt(document.getElementById('sel-emp').value);
            const val = parseFloat(document.getElementById('val-t').value);
            const desc = document.getElementById('desc-t').value;
            if(!empId || isNaN(val)) return;

            appData.trabajos.push({
                id: Date.now(),
                empId,
                valor: val,
                descripcion: desc,
                pagado: false
            });
            e.target.reset();
            await saveToCloud();
        };

        function actualizarUI() {
            // Renderizar lista de empleados
            const grid = document.getElementById('grid-emp');
            grid.innerHTML = appData.empleados.map(e => `
                <div class="bg-gray-800 p-3 rounded border border-gray-700 flex justify-between">
                    <span>${e.nombre}</span>
                </div>
            `).join('');

            // Selector de empleados
            const sel = document.getElementById('sel-emp');
            sel.innerHTML = '<option value="">Seleccionar...</option>' + 
                appData.empleados.map(e => `<option value="${e.id}">${e.nombre}</option>`).join('');

            // Calcular totales
            const total = appData.trabajos.reduce((acc, t) => acc + t.valor, 0);
            document.getElementById('total-inv').innerText = `$${total.toFixed(2)}`;
        }

    </script>

    <style>
        body { background: #0f172a; color: #f8fafc; font-family: sans-serif; }
        .card { background: #1e293b; border-radius: 8px; padding: 20px; border: 1px solid #334155; }
        input, select { background: #0f172a; border: 1px solid #475569; padding: 10px; border-radius: 4px; color: white; width: 100%; }
        button { background: #3b82f6; color: white; padding: 10px; border-radius: 4px; font-weight: bold; width: 100%; }
        button:hover { background: #2563eb; }
    </style>
</head>
<body class="p-4">

    <!-- LOGIN -->
    <div id="login-screen" class="fixed inset-0 bg-slate-950 flex items-center justify-center p-6 z-50">
        <div class="card w-full max-w-sm text-center">
            <h1 class="text-2xl font-bold mb-6 text-blue-400 text-center">NÓMINA CLOUD</h1>
            <input type="password" id="login-pass" placeholder="PIN de acceso" class="mb-4 text-center text-xl tracking-widest">
            <button onclick="intentarLogin()">INGRESAR</button>
            <p id="debug-msg" class="text-red-400 text-xs mt-4"></p>
        </div>
    </div>

    <!-- APP -->
    <div id="main-app" class="hidden max-w-2xl mx-auto space-y-6">
        <header class="flex justify-between items-center py-4 border-b border-slate-700">
            <h2 class="text-xl font-bold">Panel de Control</h2>
            <span class="text-green-400 text-xs">● Nube Conectada</span>
        </header>

        <div class="grid grid-cols-1 gap-4">
            <div class="card text-center">
                <p class="text-gray-400 text-sm uppercase">Inversión Total</p>
                <p id="total-inv" class="text-4xl font-bold text-blue-400">$0.00</p>
            </div>
        </div>

        <div class="card">
            <h3 class="text-blue-400 font-bold mb-4">Añadir Trabajador</h3>
            <div class="flex gap-2">
                <input type="text" id="nombre-empleado" placeholder="Nombre...">
                <button onclick="agregarEmpleado()" class="w-auto px-6">Añadir</button>
            </div>
            <div id="grid-emp" class="grid grid-cols-2 gap-2 mt-4"></div>
        </div>

        <div class="card">
            <h3 class="text-blue-400 font-bold mb-4">Registrar Tarea</h3>
            <form onsubmit="registrarTrabajo(event)" class="space-y-3">
                <select id="sel-emp" required></select>
                <input type="text" id="desc-t" placeholder="Descripción" required>
                <input type="number" id="val-t" step="0.01" placeholder="Monto $" required>
                <button type="submit">Guardar Registro</button>
            </form>
        </div>
    </div>

</body>
</html>
